<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de Serviços Medicinais</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #25091c;
        color: white;
      }

      header {
        background-color: #333;
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .titulo {
        text-align: center;
      }

      .menu-icon {
        cursor: pointer;
        font-size: 1.5em;
      }

      .sidebar {
        height: 100%;
        background-color: #444;
        color: white;
        position: fixed;
        top: 0;
        left: -250px;
        transition: left 0.3s ease;
        padding: 20px;
        z-index: 1000;
      }

      .sidebar.open {
        left: 0;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        margin-right: 6px;
        border: none;
        border-radius: 5px;
      }

      .submit-button {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
      }

      .search-section {
        margin: 20px;
        text-align: center;
      }

      .search-section input {
        padding: 10px;
        width: 300px;
        border: none;
        border-radius: 5px;
        margin-right: 10px;
      }

      .search-section button {
        padding: 10px;
        border: none;
        background-color: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }

      .result-list {
        margin: 20px;
        padding: 0;
      }

      .result-item {
        background-color: #333;
        margin-bottom: 15px;
        padding: 15px;
        border-radius: 5px;
      }

      .result-item h3 {
        margin: 0 0 10px;
      }

      .result-item p {
        margin: 0;
      }

      .content {
        margin-left: 0;
        transition: margin-left 0.3s ease;
      }

      .sidebar.open + .content {
        margin-left: 250px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="menu-icon" onclick="toggleSidebar()">☰ Menu</div>
      <h1 class="titulo">Buscador de Serviços Medicinais</h1>
    </header>

    <div class="sidebar" id="sidebar">
      <h2>Cadastro</h2>
      <div class="form-group">
        <label for="username">Usuário:</label>
        <input type="text" id="username" placeholder="Digite seu usuário" />
      </div>
      <div class="form-group">
        <label for="password">Senha:</label>
        <input type="password" id="password" placeholder="Digite sua senha" />
      </div>
      <button class="submit-button" onclick="cadastrar()">Cadastrar</button>
    </div>

    <div class="content">
      <div class="search-section">
        <h2>Encontre serviços médicos em sua região</h2>
        <input
          type="text"
          id="search"
          placeholder="Digite o serviço ou especialidade"
        />
        <button onclick="buscarServicos()">Buscar</button>
      </div>

      <ul class="result-list" id="result-list"></ul>
    </div>

    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const content = document.querySelector(".content");
        sidebar.classList.toggle("open");
        content.classList.toggle("sidebar-open");
      }

      function cadastrar() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        alert(`Usuário: ${username}\nSenha: ${password}`);
      }

      function buscarServicos() {
        const searchTerm = document.getElementById("search").value;
        const resultList = document.getElementById("result-list");

        const servicos = [
          {
            nome: "Clínica de Saúde ABC",
            especialidade: "Clínico Geral",
            endereco: "Rua A, 123",
          },
          {
            nome: "Consultório Odontológico XYZ",
            especialidade: "Dentista",
            endereco: "Rua B, 456",
          },
          {
            nome: "Hospital São João",
            especialidade: "Emergência",
            endereco: "Rua C, 789",
          },
        ];

        resultList.innerHTML = "";

        const resultadosFiltrados = servicos.filter(
          (servico) =>
            servico.especialidade
              .toLowerCase()
              .includes(searchTerm.toLowerCase()) ||
            servico.nome.toLowerCase().includes(searchTerm.toLowerCase())
        );

        if (resultadosFiltrados.length > 0) {
          resultadosFiltrados.forEach((servico) => {
            const li = document.createElement("li");
            li.classList.add("result-item");
            li.innerHTML = `<h3>${servico.nome}</h3><p>Especialidade: ${servico.especialidade}</p><p>Endereço: ${servico.endereco}</p>`;
            resultList.appendChild(li);
          });
        } else {
          resultList.innerHTML = "<p>Nenhum serviço encontrado.</p>";
        }
      }
    </script>
  </body>
</html>
